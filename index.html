<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#38bdf8);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
    color:#fff;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
    padding:50px;
    border-radius:20px;
    width:90%;
    max-width:650px;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

.logo{
    font-size:70px;
    margin-bottom:15px;
}

h1{
    font-size:58px;
    margin-bottom:20px;
    letter-spacing:2px;
}

p{
    font-size:20px;
    line-height:1.6;
    opacity:.9;
    margin-bottom:30px;
}

.loading{
    width:100%;
    height:8px;
    background:rgba(255,255,255,.2);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:30px;
}

.loading span{
    display:block;
    width:35%;
    height:100%;
    background:#fff;
    animation:loading 2s infinite;
}

@keyframes loading{
    0%{margin-left:-35%;}
    100%{margin-left:100%;}
}

footer{
    font-size:15px;
    opacity:.75;
}

@media(max-width:600px){

.logo{
font-size:55px;
}

h1{
font-size:42px;
}

p{
font-size:17px;
}

.container{
padding:35px 25px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="logo">🚀</div>

<h1>Coming Soon</h1>

<p>
We're working hard to launch something amazing.<br>
Our website will be available very soon.
</p>

<div class="loading">
<span></span>
</div>

<footer>
© <span id="year"></span> All Rights Reserved.
</footer>

</div>

<script>

document.getElementById("year").textContent =
new Date().getFullYear();

</script>

</body>
</html>
