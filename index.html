<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
        }
        
        .countdown {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="hero-bg min-h-screen flex items-center justify-center text-white">
    <div class="max-w-2xl mx-auto text-center px-6 py-16">
        <!-- Logo / Title -->
        <div class="mb-8">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center">
                    <span class="text-3xl font-bold text-black">🚀</span>
                </div>
                <h1 class="text-5xl font-bold tracking-tight">YourBrand</h1>
            </div>
        </div>

        <!-- Main Heading -->
        <h2 class="text-6xl md:text-7xl font-bold tracking-tighter mb-6">
            Something amazing
            <span class="block text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                is coming soon
            </span>
        </h2>

        <p class="text-xl text-gray-300 mb-12 max-w-md mx-auto">
            We're working hard to bring you an incredible new experience. 
            Stay tuned for the big launch!
        </p>

        <!-- Countdown -->
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 mb-12">
            <div class="grid grid-cols-4 gap-4 text-center" id="countdown">
                <div>
                    <div id="days" class="text-5xl font-bold countdown">00</div>
                    <div class="text-sm uppercase tracking-widest text-gray-400">Days</div>
                </div>
                <div>
                    <div id="hours" class="text-5xl font-bold countdown">00</div>
                    <div class="text-sm uppercase tracking-widest text-gray-400">Hours</div>
                </div>
                <div>
                    <div id="minutes" class="text-5xl font-bold countdown">00</div>
                    <div class="text-sm uppercase tracking-widest text-gray-400">Minutes</div>
                </div>
                <div>
                    <div id="seconds" class="text-5xl font-bold countdown">00</div>
                    <div class="text-sm uppercase tracking-widest text-gray-400">Seconds</div>
                </div>
            </div>
        </div>

        <!-- Email Signup -->
        <div class="max-w-md mx-auto mb-12">
            <p class="text-gray-300 mb-4">Get notified when we launch</p>
            <div class="flex gap-2">
                <input 
                    type="email" 
                    id="email"
                    placeholder="your@email.com"
                    class="flex-1 bg-white/10 border border-white/30 rounded-2xl px-6 py-4 text-white placeholder-gray-400 focus:outline-none focus:border-white/50 transition">
                <button 
                    onclick="subscribe()"
                    class="bg-white text-black font-semibold px-8 py-4 rounded-2xl hover:bg-gray-100 transition">
                    Notify Me
                </button>
            </div>
        </div>

        <!-- Social Links -->
        <div class="flex justify-center gap-6 text-2xl">
            <a href="#" class="hover:text-blue-400 transition"><i class="fab fa-twitter"></i></a>
            <a href="#" class="hover:text-blue-500 transition"><i class="fab fa-linkedin"></i></a>
            <a href="#" class="hover:text-pink-500 transition"><i class="fab fa-instagram"></i></a>
            <a href="#" class="hover:text-purple-500 transition"><i class="fab fa-discord"></i></a>
        </div>

        <div class="mt-16 text-sm text-gray-400">
            © 2026 YourBrand • All rights reserved
        </div>
    </div>
